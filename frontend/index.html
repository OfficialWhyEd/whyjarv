<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhyJarv</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      #wj-logo {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 56px;
        height: 56px;
        object-fit: contain;
        opacity: 0.25;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.1s ease, filter 0.1s ease;
        filter: none;
      }
      #waveform-canvas {
        position: fixed;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        width: 52px;
        height: 340px;
        pointer-events: none;
        z-index: 200;
      }
    </style>
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <img id="wj-logo" src="/wj-logo.png" alt="WJ" />
    <canvas id="waveform-canvas"></canvas>

    <div id="status-text"></div>
    <div id="jarvis-label">WHYJARV</div>
    <div id="error-text"></div>

    <!-- HUD Panels -->
    <div class="hud-panel hud-tl" id="hud-tl">
      <div class="hud-title">WHYJARV SYS</div>
      <div class="hud-row"><span class="hud-label">CORE</span><span class="hud-val hud-active">● ACTIVE</span></div>
      <div class="hud-row"><span class="hud-label">VOICE</span><span class="hud-val hud-active">● READY</span></div>
      <div class="hud-row"><span class="hud-label">STATE</span><span class="hud-val" id="hud-state">IDLE</span></div>
    </div>
    <div class="hud-panel hud-tr" id="hud-tr">
      <div class="hud-title">VOICE</div>
      <div class="hud-row"><span class="hud-label">STT</span><span class="hud-val">APPLE</span></div>
      <div class="hud-row"><span class="hud-label">TTS</span><span class="hud-val">NATIVE</span></div>
      <div class="hud-row"><span class="hud-label">AI</span><span class="hud-val hud-active">GEMINI+CLAUDE</span></div>
    </div>
    <div class="hud-panel hud-bl" id="hud-bl">
      <div class="hud-title">MCP LIVE</div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">ClickUp</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Gmail</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Calendar</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Obsidian</span></div>
    </div>
    <div class="hud-panel hud-br" id="hud-br">
      <div class="hud-title">SESSION</div>
      <div class="hud-row"><span class="hud-label">USER</span><span class="hud-val">@whyed</span></div>
      <div class="hud-row"><span class="hud-label">BUILD</span><span class="hud-val hud-active">v1.0</span></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
    (function(){
      const canvas = document.getElementById('waveform-canvas');
      const DPR = window.devicePixelRatio || 2;
      const W = 52, H = 340;
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);

      const LINES = 5;
      const S = [1.1,0.85,1.4,0.7,1.2];
      const P = [0, 0.65,1.3,1.95,2.6];
      const F = [1, 1.6, 0.75,2.2,1.35];

      let analyser=null, buf=null, rmsSmooth=0, t=0;

      navigator.mediaDevices.getUserMedia({audio:true,video:false})
        .then(stream=>{
          const ac = new AudioContext();
          const src = ac.createMediaStreamSource(stream);
          analyser = ac.createAnalyser();
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.4;
          src.connect(analyser);
          buf = new Float32Array(analyser.fftSize);
        }).catch(()=>{});

      function rms(){
        if(!analyser) return 0;
        analyser.getFloatTimeDomainData(buf);
        let s=0; for(let i=0;i<buf.length;i++) s+=buf[i]*buf[i];
        return Math.sqrt(s/buf.length);
      }

      (function loop(){
        requestAnimationFrame(loop);
        t += 0.016;
        const v = rms() * 55;
        rmsSmooth += (v > rmsSmooth ? 0.4 : 0.07) * (v - rmsSmooth);
        const amp   = Math.max(10, rmsSmooth);
        const live  = rmsSmooth > 3;
        const cx    = W / 2;

        ctx.clearRect(0, 0, W, H);

        for(let li=0; li<LINES; li++){
          const mid  = (LINES-1)/2;
          const dist = Math.abs(li - mid) / mid;
          const a    = live ? Math.max(0.1, 0.9-dist*0.3) : Math.max(0.15, 0.35-dist*0.07);
          const lw   = live ? Math.max(0.7, 2.0-dist*0.7) : 1.0;
          const lAmp = amp * (1 - dist*0.5);

          // inner glow: 3 passate
          for(const [width, opacity] of [[lw*3.5, a*0.1],[lw*1.5, a*0.4],[lw*0.65, a]]){
            ctx.beginPath();
            ctx.lineWidth = width;
            ctx.strokeStyle = `rgba(201,75,37,${opacity})`;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for(let i=0; i<=120; i++){
              const ny  = i/120;
              const env = Math.sin(ny * Math.PI);
              const x   = cx + Math.sin(ny*Math.PI*2.2*F[li] + t*S[li] + P[li]) * lAmp * env;
              const y   = ny * H;
              i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke();
          }
        }
      })();
    })();
    </script>
  </body>
</html>
