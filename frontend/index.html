<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhyJarv</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="orb-canvas"></canvas>

    <!-- Minimal controls — top right -->
    <div id="controls">
      <button id="btn-mute" title="Mute/Unmute">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <button id="btn-menu" title="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>

    <!-- Dropdown menu -->
    <div id="menu-dropdown" style="display:none">
      <button id="btn-settings">Settings</button>
      <button id="btn-restart">Restart Server</button>
      <button id="btn-fix-self">Fix Yourself</button>
    </div>

    <div id="status-text"></div>
    <div id="jarvis-label">WHYJARV</div>
    <div id="error-text"></div>

    <!-- HUD Panels -->
    <div class="hud-panel hud-tl" id="hud-tl">
      <div class="hud-title">WHYJARV SYS</div>
      <div class="hud-row"><span class="hud-label">CORE</span><span class="hud-val hud-active">● ACTIVE</span></div>
      <div class="hud-row"><span class="hud-label">VOICE</span><span class="hud-val hud-active">● READY</span></div>
      <div class="hud-row"><span class="hud-label">STATE</span><span class="hud-val" id="hud-state">IDLE</span></div>
    </div>
    <div class="hud-panel hud-tr" id="hud-tr">
      <div class="hud-title">VOICE</div>
      <div class="hud-row"><span class="hud-label">STT</span><span class="hud-val">APPLE</span></div>
      <div class="hud-row"><span class="hud-label">TTS</span><span class="hud-val">NATIVE</span></div>
      <div class="hud-row"><span class="hud-label">AI</span><span class="hud-val hud-active">GEMINI+CLAUDE</span></div>
    </div>
    <div class="hud-panel hud-bl" id="hud-bl">
      <div class="hud-title">MCP LIVE</div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">ClickUp</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Gmail</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Calendar</span></div>
      <div class="hud-row"><span class="hud-label">▸</span><span class="hud-val">Obsidian</span></div>
    </div>
    <div class="hud-panel hud-br" id="hud-br">
      <div class="hud-title">SESSION</div>
      <div class="hud-row"><span class="hud-label">USER</span><span class="hud-val">@whyed</span></div>
      <div class="hud-row"><span class="hud-label">BUILD</span><span class="hud-val hud-active">v1.0</span></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
